<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人网站</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f0f0f0;
    }
    header {
      background-color: #333;
      color: #fff;
      text-align: center;
      padding: 1rem;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem;
      background-color: #fff;
      box-shadow: 0px 2px 4px rgba(0, 0, 0, 0.1);
      border-radius: 5px;
      margin-top: 20px;
    }
    .profile-img {
      max-width: 200px;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <header>
    <h1>欢迎来到我的个人网站</h1>
    <p>一些关于我的信息和内容</p>
  </header>
  <div class="container">
    <img src="profile.jpg" alt="My Profile Picture" class="profile-img">
    <h2>个人简介</h2>
    <p>你好！我是[你的名字]，欢迎访问我的个人网站。在这里，我将分享一些关于我的信息和兴趣爱好，以及一些有趣的内容。</p>
    <h2>我的兴趣</h2>
    <p>我对编程、设计和创意表达非常感兴趣。我喜欢学习新的技能，探索新的领域，并与他人分享我的经验和知识。</p>
    <h2>联系我</h2>
    <p>如果你有任何问题或想要与我交流，可以通过电子邮件 [你的电子邮件地址] 联系我。</p>
  </div>
</body>
</html>
