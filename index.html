<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人网站</title>
  <style>
    /* ... 前面的样式代码 ... */
    .rotate {
      animation: rotate 10s infinite linear;
    }
    
    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
    
    .fade-in {
      opacity: 0;
      animation: fadeIn 2s forwards;
    }
    
    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }
    
    .bounce {
      animation: bounce 1s infinite;
    }
    
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-20px);
      }
      60% {
        transform: translateY(-10px);
      }
    }
  </style>
</head>
<body>
  <header>
    <!-- ... 头部代码 ... -->
  </header>
  <div class="container">
    <img src="profile.jpg" alt="My Profile Picture" class="profile-img rotate">
    <h2 class="fade-in">个人简介</h2>
    <p class="fade-in">Hi，我是[你的名字]，一个充满创意和激情的人。在这个多彩的世界里，我用代码、设计和艺术表达自己。</p>
    <h2 class="fade-in">我的兴趣</h2>
    <div class="interests">
      <!-- ... 兴趣标签 ... -->
    </div>
    <h2 class="fade-in">联系我</h2>
    <p class="fade-in">如果你想要一起探索创意的世界，或者有什么问题，欢迎通过电子邮件 [你的电子邮件地址] 联系我。</p>
  </div>
</body>
</html>
