<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artistic Font Example</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Pacifico', cursive;
            background-color: #0c0c0c;
            font-size: 48px;
            color: aliceblue;
            text-align: center;
            margin-top: 100px; /* 为内容留出空间 */
        }

        header {
            background-color: #e39fd3;
            color: rgb(169, 225, 234);
            padding: 10px;
            text-align: center;
            position: fixed; /* 固定在顶部 */
            top: 0; /* 顶部位置 */
            width: 100%; /* 宽度占满整个页面 */
        }
    </style>
</head>
<body>
    <header>
        Live Page
    </header>
    <div>Still constructing,be patient</div>
</body>
</html>
